name: "Build Android APK"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: "4.2.2"
  EXPORT_NAME: "PusoyNatural"

jobs:
  export-android:
    name: Export Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          unzip -q Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          sudo mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Create Keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Setup Export Presets
        run: |
          cat <<EOF > export_presets.cfg
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/android/${{ env.EXPORT_NAME }}.apk"
          encryption_key=""
          encrypt_directory=false
          encrypt_pck=false
          
          [preset.0.options]
          architecture/armeabi-v7a=true
          architecture/arm64-v8a=true
          architecture/x86=false
          architecture/x86_64=false
          package/unique_name="com.tamayo.pusoynatural"
          package/name="Pusoy Natural"
          package/signed=true
          keystore/debug="debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release="debug.keystore"
          keystore/release_user="androiddebugkey"
          keystore/release_password="android"
          graphics/renderer_backend=1
          EOF

      - name: Import Assets (Headless Editor)
        run: |
          # Initial import can be finicky in Godot 4 CI
          godot --headless --editor --quit || true
          godot --headless --editor --quit || true

      - name: Android Export
        run: |
          mkdir -p build/android
          godot --headless --export-release "Android" build/android/${{ env.EXPORT_NAME }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-APK
          path: build/android/${{ env.EXPORT_NAME }}.apk

      - name: Publish APK Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "android-${{ github.run_number }}"
          name: "${{ env.EXPORT_NAME }} APK ${{ github.run_number }}"
          draft: false
          prerelease: false
          files: build/android/${{ env.EXPORT_NAME }}.apk
