name: "Build Android APK"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-android:
    name: Export Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          unzip -q Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Import Assets (Headless Editor)
        run: |
          # Godot needs to import assets before it can export an APK
          godot --headless --editor --quit

      - name: Create Keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Setup Export Presets
        run: |
          cat <<EOF > export_presets.cfg
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="PusoyNatural.apk"
          encryption_key=""
          encrypt_directory=false
          encrypt_pck=false
          
          [preset.0.options]
          architecture/armeabi-v7a=true
          architecture/arm64-v8a=true
          architecture/x86=false
          architecture/x86_64=false
          package/unique_name="com.tamayo.pusoynatural"
          package/name="Pusoy Natural"
          package/signed=true
          keystore/debug="debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          EOF

      - name: Android Export
        run: |
          mkdir -p build/android
          godot --headless --export-release "Android" build/android/PusoyNatural.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PusoyNatural-APK
          path: build/android/PusoyNatural.apk
